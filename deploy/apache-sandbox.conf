# AI Trading Terminal — MAMP/Apache vhost snippet
# Serves the built React SPA at http://localhost:8888/sandbox/ and reverse-proxies
# the API + WebSocket to the FastAPI backend (uvicorn on :8000).
#
# Apply: append this block to /Applications/MAMP/conf/apache/httpd.conf and restart
# MAMP's Apache. Requires mod_proxy, mod_proxy_http, mod_proxy_wstunnel (all loaded
# in MAMP by default). The backend (uvicorn :8000), MySQL (MAMP :8889) and Ollama
# (:11434) must be running — use ./serve.sh.

# === AI Trading Terminal (sandbox) — BEGIN (managed) ===
# Proxy API + WS first so they win over the static Alias below.
ProxyPreserveHost On
# Local LLM research/chat calls can take 60-120s; don't let the proxy cut them off.
ProxyTimeout 300
ProxyPass        /sandbox/api  http://127.0.0.1:8001/api connectiontimeout=5 timeout=300
ProxyPassReverse /sandbox/api  http://127.0.0.1:8001/api
ProxyPass        /sandbox/ws   ws://127.0.0.1:8001/ws
ProxyPassReverse /sandbox/ws   ws://127.0.0.1:8001/ws

# Serve the production build; SPA deep links fall back to index.html.
Alias /sandbox /Users/ulrich/Sites/sandbox/frontend/dist
<Directory "/Users/ulrich/Sites/sandbox/frontend/dist">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
    FallbackResource /sandbox/index.html
</Directory>
# === AI Trading Terminal (sandbox) — END (managed) ===
