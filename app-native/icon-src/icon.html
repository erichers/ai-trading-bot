<!DOCTYPE html>
<!--
  AI Trading Terminal app icon source — 1024x1024.
  Near-black background (#0a0b0d), amber (#f7a01d) line + axis motif,
  green (#1bcf6b) up-candles with a couple amber down/neutral candles.
  Render to PNG with headless Chrome:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless --disable-gpu --no-sandbox --force-device-scale-factor=1 \
      --window-size=1024,1024 --screenshot=/tmp/icon.png \
      file:///.../icon.html
-->
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: #0a0b0d; }
  #icon { width: 1024px; height: 1024px; display: block; }
</style>
</head>
<body>
<svg id="icon" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#101216"/>
      <stop offset="55%" stop-color="#0a0b0d"/>
      <stop offset="100%" stop-color="#060708"/>
    </linearGradient>
    <linearGradient id="amberLine" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f7a01d"/>
      <stop offset="100%" stop-color="#ffd27a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded-square background (macOS-style squircle) -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="6" y="6" width="1012" height="1012" rx="220" ry="220" fill="none"
        stroke="#1c2026" stroke-width="6"/>

  <!-- subtle grid -->
  <g stroke="#191c22" stroke-width="3">
    <line x1="160" y1="250" x2="864" y2="250"/>
    <line x1="160" y1="420" x2="864" y2="420"/>
    <line x1="160" y1="590" x2="864" y2="590"/>
    <line x1="160" y1="760" x2="864" y2="760"/>
  </g>

  <!-- candlesticks: green up-candles + a couple amber candles -->
  <!-- each: thin wick + thick body -->
  <g stroke-linecap="round">
    <!-- candle 1 (green up) -->
    <line x1="250" y1="560" x2="250" y2="720" stroke="#1bcf6b" stroke-width="10"/>
    <rect x="228" y="600" width="44" height="90" rx="8" fill="#1bcf6b"/>
    <!-- candle 2 (amber down) -->
    <line x1="360" y1="470" x2="360" y2="640" stroke="#f7a01d" stroke-width="10"/>
    <rect x="338" y="520" width="44" height="80" rx="8" fill="#f7a01d"/>
    <!-- candle 3 (green up) -->
    <line x1="470" y1="430" x2="470" y2="600" stroke="#1bcf6b" stroke-width="10"/>
    <rect x="448" y="470" width="44" height="95" rx="8" fill="#1bcf6b"/>
    <!-- candle 4 (green up, tall) -->
    <line x1="580" y1="330" x2="580" y2="520" stroke="#1bcf6b" stroke-width="10"/>
    <rect x="558" y="370" width="44" height="110" rx="8" fill="#1bcf6b"/>
    <!-- candle 5 (amber neutral) -->
    <line x1="690" y1="300" x2="690" y2="470" stroke="#f7a01d" stroke-width="10"/>
    <rect x="668" y="340" width="44" height="78" rx="8" fill="#f7a01d"/>
    <!-- candle 6 (green up, breakout) -->
    <line x1="800" y1="240" x2="800" y2="420" stroke="#1bcf6b" stroke-width="10"/>
    <rect x="778" y="280" width="44" height="100" rx="8" fill="#1bcf6b"/>
  </g>

  <!-- amber trend line over the candles -->
  <polyline points="250,650 360,560 470,510 580,420 690,380 800,300"
            fill="none" stroke="url(#amberLine)" stroke-width="22"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- nodes on the line -->
  <g fill="#ffd27a">
    <circle cx="250" cy="650" r="14"/>
    <circle cx="470" cy="510" r="14"/>
    <circle cx="690" cy="380" r="14"/>
    <circle cx="800" cy="300" r="16" fill="#f7a01d"/>
  </g>

  <!-- baseline axis -->
  <line x1="160" y1="800" x2="864" y2="800" stroke="#2a2f37" stroke-width="8" stroke-linecap="round"/>
  <line x1="160" y1="250" x2="160" y2="800" stroke="#2a2f37" stroke-width="8" stroke-linecap="round"/>
</svg>
</body>
</html>
