<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AI Trading Terminal</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0b0e11; color: #c9d1d9;
        font-family: -apple-system, system-ui, sans-serif; }
      .c { height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
      .s { width: 28px; height: 28px; border: 3px solid #1f2937; border-top-color: #3b82f6;
        border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="c">
      <div class="s"></div>
      <div>Starting AI Trading Terminal…</div>
    </div>
  </body>
</html>
